<!DOCTYPE html>
<html>
<head>
<title>DISCIPLINE</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>DISCIPLINE</h1>
</header>

<!-- HOME -->
<div id="homePage" class="page active">

<div id="level">Level: 1</div>
<div id="xp">XP: 0</div>

<button onclick="addXP()">+10 XP</button>

</div>

<!-- NO FAP -->
<div id="nofapPage" class="page">
<h2>No Fap System</h2>

<button onclick="startNoFap()">START</button>

<div>Days: <span id="nofapDays">0</span></div>
<div id="nofapRank">Rank: None</div>

</div>


<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('nofap')">NoFap</button>
</nav>

<script src="script.js"></script>
</body>
</html>
