<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DISCIPLINE</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* KEEP ORIGINAL SYSTEM SAFE */
body{
user-select:none;
margin:0;
font-family:'Share Tech Mono', monospace;
background:#0b0b0b;
color:#eaeaea;
}

/* Pages (unchanged behavior for JS) */
.page{
display:none;
}

.page.active{
display:block;
}

/* Header (ONLY TEXT NOW) */
header{
text-align:center;
padding:18px;
border-bottom:1px solid #222;
}

header h1{
font-family:'Bebas Neue', sans-serif;
letter-spacing:2px;
margin:0;
}

.header-sub{
font-size:12px;
opacity:0.8;
}

/* KEEP YOUR ORIGINAL CLASSES SAFE */
.achievement{
padding:10px;
border:1px solid #333;
margin-bottom:8px;
border-radius:6px;
}

.achievement.locked{
opacity:0.35;
}

/* Bottom Navigation (NEW BUT SAFE) */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#0f0f0f;
border-top:1px solid #222;
display:flex;
justify-content:space-around;
align-items:center;
z-index:999;
}

/* ICON BUTTONS */
.nav-btn{
background:none;
border:none;
color:#aaa;
font-size:22px;
cursor:pointer;
transition:0.2s;
}

.nav-btn:hover{
color:white;
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="toast" id="toast">⬆ LEVEL UP</div>

<header>

<h1>DISCIPLINE</h1>

<div class="header-sub">
Stay Hard Motherfucker
</div>

</header>


<!-- ================= HOME PAGE ================= -->

<div id="homePage" class="page active">

<div class="quote-box" id="quoteBox" title="Click for new quote"></div>

<div class="stats-bar">

<div>
<span class="level-label">LEVEL</span>
<div class="level-badge" id="levelBadge">1</div>
</div>

<div class="xp-section">

<div class="xp-header">
<span>XP PROGRESS</span>
<span id="xpLabel">0 / 250</span>
</div>

<div class="xp-track">
<div class="xp-fill" id="xpFill" style="width:0%"></div>
</div>

</div>

</div>


<div class="section-label">Task Pool</div>

<div class="task-pool">

<div class="input-row">
<input type="text" id="taskInput" placeholder="Add a task to pool...">
<button onclick="addTask()">ADD</button>
</div>

<div id="taskPool"></div>

<div style="margin-top:10px">
<button onclick="generateDaily()">GENERATE DAILY TASKS</button>
</div>

</div>


<div class="section-label">
Daily Tasks — <span id="completedCount">0</span> completed today
</div>

<div id="dailyList"></div>


<div class="section-label">Field Notes</div>

<textarea id="notes" placeholder="Write your notes, plans, reflections..."></textarea>

</div>


<!-- ================= ACHIEVEMENTS PAGE ================= -->

<div id="achievementsPage" class="page">

<h2>Achievements</h2>

<div class="section-label">Unlocked</div>
<div id="unlockedAchievements"></div>

<div class="section-label">Locked</div>
<div id="lockedAchievements"></div>

</div>


<!-- ================= BOTTOM NAV ================= -->

<div class="bottom-nav">

<button class="nav-btn" onclick="showHome()" title="Home">
🏠
</button>

<button class="nav-btn" onclick="showAchievements()" title="Achievements">
🏆
</button>

</div>


<!-- JS (UNCHANGED CONNECTION) -->
<script src="script.js"></script>

<script>

function showHome(){
document.getElementById("homePage").classList.add("active")
document.getElementById("achievementsPage").classList.remove("active")
}

function showAchievements(){
document.getElementById("homePage").classList.remove("active")
document.getElementById("achievementsPage").classList.add("active")
}

</script>

</body>
</html>
